<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DIAG">
<meta name="theme-color" content="#0a0a0f">
<title>DIAG — inset:0 vs height:100vh (앱 패턴 최종확인)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100vh; overflow:hidden; background:#16a34a; }  /* 초록 = 틈 있으면 보임 */
  body { color:#fff; font-family:ui-monospace,'Courier New',monospace; }

  /* 왼쪽: 우리 앱 화면 패턴 = position:fixed; inset:0 */
  #leftInset {
    position:fixed; inset:0; width:50%; left:0;
    background:repeating-linear-gradient(135deg,#2860d0 0 30px,#1d49a8 30px 60px); /* 파랑 = inset:0 */
    z-index:0;
  }
  /* 오른쪽: SO 검증 패턴 = top:0; height:100vh */
  #rightVh {
    position:fixed; top:0; right:0; left:50%; width:50%; height:100vh;
    background:repeating-linear-gradient(135deg,#dc2626 0 30px,#b01c1c 30px 60px); /* 빨강 = height:100vh */
    z-index:0;
  }
  #panel { position:fixed; top:calc(env(safe-area-inset-top) + 12px); left:12px; right:12px; z-index:9;
    background:rgba(0,0,0,.85); border:1px solid rgba(255,255,255,.3); border-radius:12px;
    padding:12px; font-size:11.5px; line-height:1.85; }
  #panel b{color:#ffe000}
  .q { position:fixed; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom) + 14px); z-index:9;
    background:rgba(0,0,0,.8); border-radius:10px; padding:12px 14px; font-size:12.5px; line-height:1.65;
    font-family:'Malgun Gothic',sans-serif; color:#fff; }
  .q b{color:#ffe000}
</style></head>
<body>
  <div id="leftInset"></div>
  <div id="rightVh"></div>
  <div id="panel">측정 중…</div>
  <div class="q">
    <b>최종확인:</b> 화면 <b>맨 아래 홈막대 자리</b>를 좌/우로 비교<br>
    ▸ <span style="color:#5b8cf0">왼(파랑=inset:0)</span>도 바닥까지 참 = <b>body만 고치면 앱 끝</b><br>
    ▸ 왼쪽만 아래에 <span style="color:#3ee87a">초록</span> 틈 = 앱 화면도 height:100vh로 바꿔야 함<br>
    ★ 스샷 1장 (맨 아래 좌우 색 차이만 보면 됨)
  </div>
<script>
  function probe(u){const el=document.createElement('div');el.style.cssText='position:fixed;top:0;width:0;visibility:hidden;height:'+u;document.body.appendChild(el);const h=el.offsetHeight;el.remove();return h;}
  function upd(){
    const s=document.createElement('div');
    s.style.cssText='position:fixed;bottom:0;height:env(safe-area-inset-bottom);width:0';
    document.body.appendChild(s); const sab=s.offsetHeight; s.remove();
    document.getElementById('panel').innerHTML=
      `100vh <b>${probe('100vh')}</b> · 100dvh <b>${probe('100dvh')}</b> · 100lvh <b>${probe('100lvh')}</b><br>`+
      `safeBot <b>${sab}px</b> · 왼=inset:0(파랑) 오른=height:100vh(빨강)`;
  }
  upd(); setInterval(upd,700);
</script>
</body></html>
