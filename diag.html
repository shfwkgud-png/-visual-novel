<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<!-- ★ 실제 앱(novel.html)과 100% 동일한 뷰포트/PWA 메타 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DIAG">
<meta name="theme-color" content="#0a0a0f">
<title>PANDORA 뷰포트 진단</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* body = 실제 앱과 동일: fixed inset:0, bg는 앱의 --bg(#0a0a0f) 대신 ★빨강★
     → 앱이라면 검게 보일 "틈"이 여기선 빨강으로 드러남 */
  html { background:#0a0a1a; }
  body {
    position:fixed; inset:0;
    background:#e02040;                 /* ← 앱에선 이 자리가 #0a0a0f(검정). 진단용 빨강 */
    font-family:system-ui,-apple-system,'Malgun Gothic',sans-serif;
    color:#fff; overflow:hidden;
  }
  /* 상단 세이프에어리어 표시 (초록) */
  .safe-top { position:fixed; top:0; left:0; right:0;
    height:env(safe-area-inset-top); background:rgba(60,220,130,.6); z-index:5; }
  /* ===== 실제 게임화면 구조 재현: 좌(현재방식) vs 우(제안fix) ===== */
  /* 공통: 뒤에 깔린 bg는 100lvh로 풀높이 (앱의 #bgLayer와 동일) */
  .bgfull { position:fixed; inset:0; height:100lvh; z-index:0;
    background:repeating-linear-gradient(135deg,#3a2a55 0 22px,#332448 22px 44px); }
  /* 좌: 현재 앱 = height:var(--vvh,100dvh) = 793 (짧음 → 아래 빨강 틈) */
  .stageA { position:fixed; top:0; left:0; width:50%; height:var(--vvh,100dvh);
    background:rgba(40,120,255,.22); z-index:1; border-right:2px dashed #fff; overflow:hidden; }
  /* 우: 제안 fix = height:100lvh = 852 (풀높이 → 틈 없음) */
  .stageB { position:fixed; top:0; right:0; width:50%; height:100lvh;
    background:rgba(255,140,40,.16); z-index:1; overflow:hidden; }
  /* 각 스테이지의 bottom:0 바 (게임의 입력바 위치 재현) */
  .stageA .ibar, .stageB .ibar { position:absolute; left:0; right:0; bottom:0;
    padding:10px 0 calc(10px + env(safe-area-inset-bottom));
    text-align:center; font-size:11px; font-weight:800; border-top:2px solid #fff; }
  .stageA .ibar { background:#2860d0; }
  .stageB .ibar { background:#d97a20; }
  .stg-lab { position:absolute; top:calc(env(safe-area-inset-top) + 96px); width:100%;
    text-align:center; font-size:11px; font-weight:800; opacity:.9; }
  /* B안: 진짜 바닥까지 = 100lvh (앱 bgLayer가 쓰는 것) 경계선 */
  .lvhMark { position:fixed; top:0; left:0; width:6px; height:100lvh;
    background:#ffd000; z-index:6; }
  .dvhMark { position:fixed; top:0; right:0; width:6px; height:100dvh;
    background:#00e0ff; z-index:6; }
  /* 바닥 바: 실제 앱 #tabBar와 동일한 방식 (absolute bottom:0 + safe-area 패딩) */
  .bar { position:absolute; left:0; right:0; bottom:0; z-index:4;
    background:rgba(20,180,90,.92);     /* ← 초록 바 = 세이프에어리어까지 칠해지는지 확인 */
    padding:12px 0 calc(12px + env(safe-area-inset-bottom));
    text-align:center; font-size:13px; font-weight:700;
    border-top:2px solid #fff; }
  .bar small { display:block; font-weight:400; opacity:.85; font-size:11px; margin-top:2px; }
  /* 숫자 리드아웃 */
  #nums { position:fixed; top:calc(env(safe-area-inset-top) + 16px); left:16px; right:16px; z-index:9;
    background:rgba(0,0,0,.72); border:1px solid rgba(255,255,255,.25); border-radius:12px;
    padding:14px 16px; font-family:ui-monospace,'Courier New',monospace; font-size:13px; line-height:1.7; }
  #nums b { color:#ffd000; }
  .legend { position:fixed; bottom:calc(env(safe-area-inset-bottom) + 78px); left:16px; right:16px; z-index:9;
    font-size:11.5px; line-height:1.6; background:rgba(0,0,0,.6); border-radius:10px; padding:10px 12px; }
  .legend i { font-style:normal; padding:1px 6px; border-radius:5px; }
</style></head>
<body>
  <div class="safe-top"></div>
  <div class="stageA"><div class="stg-lab">좌: 현재 방식<br>height:--vvh</div><div class="ibar">현재 바<br>여기 아래 빨강?</div></div>
  <div class="stageB"><div class="stg-lab">우: 제안 fix<br>height:100lvh</div><div class="ibar">fix 바<br>빨강 없어야 함</div></div>
  <div class="lvhMark"></div>
  <div class="dvhMark"></div>

  <div id="nums">측정 중…</div>

  <div class="legend">
    <div><b>좌(파랑)</b> = 현재 앱 방식 · <b>우(주황)</b> = 제안 fix</div>
    <div style="margin-top:5px">맨 아래 <b>파란 바 아래에 빨강 틈</b>이 보이고,<br><b>주황 바는 바닥까지 꽉</b> 차면 → fix 성공 확정!</div>
  </div>

<script>
  function upd() {
    const vv = window.visualViewport;
    const dv = document.createElement('div');
    dv.style.cssText='position:fixed;top:0;height:100dvh;width:0;visibility:hidden'; document.body.appendChild(dv);
    const dvh = dv.offsetHeight; dv.remove();
    const lv = document.createElement('div');
    lv.style.cssText='position:fixed;top:0;height:100lvh;width:0;visibility:hidden'; document.body.appendChild(lv);
    const lvh = lv.offsetHeight; lv.remove();
    const cs = getComputedStyle(document.documentElement);
    const probe = document.createElement('div');
    probe.style.cssText='position:fixed;bottom:0;height:env(safe-area-inset-bottom);width:0'; document.body.appendChild(probe);
    const sab = probe.offsetHeight; probe.remove();
    const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    document.getElementById('nums').innerHTML =
      `100dvh <b>${dvh}</b>  vs  100lvh <b>${lvh}</b>  (차이 <b>${lvh-dvh}px</b>=틈)<br>`+
      `safe-area-bottom <b>${sab}px</b>  ·  standalone <b>${standalone}</b>`;
  }
  upd();
  if (window.visualViewport){ visualViewport.addEventListener('resize',upd); visualViewport.addEventListener('scroll',upd); }
  window.addEventListener('resize',upd);
  setInterval(upd, 800);
</script>
</body></html>
