<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DIAG">
<meta name="theme-color" content="#0a0a0f">
<title>DIAG — fixed vs static 세이프에어리어 판정</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* ① 정적 배경: html/body에 초록. 404처럼 iOS가 세이프에어리어까지 칠하는지 */
  html, body { height:100%; background:#16a34a; }  /* 초록 = 정적 배경 */
  body { color:#fff; font-family:ui-monospace,'Courier New',monospace; overflow:hidden; }

  /* ② fixed 풀스크린 빨강 박스 (우리 앱의 #bgLayer와 동일한 방식) */
  #fixedbg {
    position:fixed; top:0; left:0; width:100%;
    height:100vh;   /* 폴백 */
    height:100lvh;  /* iOS = 852 */
    background:repeating-linear-gradient(135deg,#dc2626 0 30px,#b01c1c 30px 60px); /* 빨강 = fixed 레이어 */
    z-index:0;
  }

  #panel { position:fixed; top:calc(env(safe-area-inset-top) + 14px); left:12px; right:12px; z-index:9;
    background:rgba(0,0,0,.85); border:1px solid rgba(255,255,255,.3); border-radius:12px;
    padding:13px; font-size:12px; line-height:1.9; }
  #panel b{color:#ffe000}
  .q { position:fixed; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom) + 14px); z-index:9;
    background:rgba(0,0,0,.75); border-radius:10px; padding:12px 14px; font-size:13px; line-height:1.7;
    font-family:'Malgun Gothic',sans-serif; color:#fff; }
  .q b{color:#ffe000}
</style></head>
<body>
  <div id="fixedbg"></div>
  <div id="panel">측정 중…</div>
  <div class="q">
    <b>판정:</b> 맨 아래 홈인디케이터 자리(막대 있는 곳) 색은?<br>
    ▸ <span style="color:#3ee87a">초록</span> = fixed는 세이프에어리어 못 칠함 → 배경을 <b>정적</b>으로 바꾸면 해결<br>
    ▸ <span style="color:#ff6b6b">빨강</span> = fixed도 칠함 → 버그는 딴 데<br>
    ★ 홈화면 아이콘으로 열고 <b>스샷 1장</b>
  </div>
<script>
  function upd(){
    const p=document.createElement('div');
    p.style.cssText='position:fixed;bottom:0;height:env(safe-area-inset-bottom);width:0';document.body.appendChild(p);
    const sab=p.offsetHeight;p.remove();
    document.getElementById('panel').innerHTML=
      `screen <b>${screen.height}</b> · innerH <b>${window.innerHeight}</b> · safeBot <b>${sab}px</b><br>`+
      `standalone <b>${window.navigator.standalone||matchMedia('(display-mode:standalone)').matches}</b> — <b>fixed vs static 판정</b>`;
  }
  upd(); setInterval(upd,700);
</script>
</body></html>
