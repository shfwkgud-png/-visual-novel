<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>낙인의 검 - 비주얼 노벨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #2a2040;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --accent: #6b3fa0;
    --accent2: #3a1f60;
    --red: #8b2020;
    --shadow: rgba(0,0,0,0.8);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* API KEY SCREEN */
  #apiScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 16px;
  }
  #apiScreen h1 {
    font-family: 'Noto Serif KR', serif;
    color: var(--gold);
    font-size: 2rem;
    letter-spacing: 0.2em;
  }
  #apiScreen p { color: var(--text-dim); font-size: 0.85rem; }
  #apiKeyInput {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 4px;
    width: min(360px, 85vw);
    font-size: 0.9rem;
    outline: none;
  }
  #apiKeyInput:focus { border-color: var(--gold); }
  .start-btn {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 12px 32px;
    border-radius: 4px;
    font-weight: 700;
    cursor: pointer;
    font-size: 1rem;
    letter-spacing: 0.1em;
  }
  .start-btn:hover { background: #e0be6a; }
  #continueBtn {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    display: none;
  }
  #continueBtn:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  #deleteBtn {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 0.75rem; padding: 4px 8px;
    display: none;
  }
  #deleteBtn:hover { color: var(--red); }

  /* GAME SCREEN */
  #gameScreen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* BACKGROUND */
  #bgLayer {
    position: fixed; inset: 0;
    background-size: cover;
    background-position: center;
    background-image: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
    transition: background-image 0.8s ease;
    z-index: 0;
  }
  #bgOverlay {
    position: fixed; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.4) 100%);
    z-index: 1;
  }

  /* CHARACTER DISPLAY */
  #charLayer {
    position: fixed;
    bottom: 180px;
    left: 50%;
    transform: translateX(-50%);
    height: 55vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 20px;
    z-index: 2;
    transition: all 0.5s ease;
  }
  .char-sprite {
    height: 100%;
    max-width: 40vw;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
    transition: all 0.4s ease;
    opacity: 0;
    transform: translateY(20px);
  }
  .char-sprite.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .char-sprite.speaking {
    filter: drop-shadow(0 0 30px rgba(201,168,76,0.3));
  }
  .char-sprite.silent {
    filter: brightness(0.5) drop-shadow(0 0 10px rgba(0,0,0,0.8));
  }

  /* DIALOGUE BOX */
  #dialogueBox {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 16px 16px;
  }
  #nameplate {
    display: inline-block;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
    border: 1px solid var(--gold-dim);
    padding: 4px 20px;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.95rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: -1px;
    min-width: 80px;
    text-align: center;
  }
  #dialoguePanel {
    background: linear-gradient(180deg, rgba(10,8,20,0.96) 0%, rgba(5,4,12,0.98) 100%);
    border: 1px solid var(--border);
    border-top: 1px solid var(--gold-dim);
    padding: 16px 20px;
    min-height: 110px;
    position: relative;
  }
  #dialogueText {
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }
  #continueHint {
    position: absolute;
    bottom: 12px; right: 16px;
    color: var(--gold-dim);
    font-size: 0.75rem;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* THINKING INDICATOR */
  .thinking-text {
    color: var(--text-dim);
    font-style: italic;
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .thinking-dots::after {
    content: '';
    animation: dots 1.5s steps(4,end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* INPUT BAR */
  #inputBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 11;
    display: none;
    padding: 12px 16px;

    align-items: center;

    top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;

    align-items: center;
    padding: 8px 16px;

    color: var(--gold-dim);
    font-size: 0.8rem;
    letter-spacing: 0.2em;

    border: 1px solid var(--border);

    border-radius: 3px;
    cursor: pointer;
    font-size: 0.75rem;

    top: 40px; right: 16px;

    background: rgba(10,8,20,0.9);

    font-size: 0.75rem;
    color: var(--text-dim);
    min-width: 140px;
    display: none;

  #statusPanel.visible { display: block; }
  .stat-row { display: flex; justify-content: space-between; gap: 16px; margin: 3px 0; }
  .stat-label { color: var(--gold-dim); }
  .stat-val { color: var(--text); }

  /* MOBILE */
  @media (max-width: 600px) {
    #charLayer { height: 40vh; bottom: 200px; gap: 10px; }
    .char-sprite { max-width: 45vw; }
    #dialogueText { font-size: 0.88rem; }
    #dialoguePanel { min-height: 90px; padding: 12px 14px; }
    #nameplate { font-size: 0.85rem; padding: 3px 14px; }
    #inputBar { padding: 8px 10px; gap: 6px; }
    #userInput { font-size: 0.85rem; padding: 8px 10px; height: 40px; }
    #sendBtn { padding: 8px 14px; font-size: 0.8rem; height: 40px; }
    .start-btn { width: min(280px, 80vw); }
    #continueBtn { width: min(280px, 80vw); }
  }

  @media (max-height: 600px) {
    #charLayer { height: 30vh; bottom: 160px; }
    #dialoguePanel { min-height: 70px; }
  }
</style>
</head>

// ===== SYSTEM PROMPT =====
const WORLD_PROMPT = `당신은 다크 판타지 비주얼 노벨 "낙인의 검"의 게임 마스터입니다.

## 세계관: 아스테리아 대륙
다섯 왕국이 패권을 다투는 중세 판타지 세계. 마법과 검이 공존하며, 귀족과 평민의 격차가 극심하다. 왕국 뒤에는 "그림자 의회"라는 비밀 결사가 존재하며 왕국들을 조종한다.

**5대 세력:**
- 레온하르트 왕국: 노왕 레오나르가 통치. 가장 강대하나 부패 심함
- 자유도시 연맹: 해적, 상인, 용병의 도시들. 항구도시 베른이 중심
- 북방 부족: 프레야의 고향. 문명을 거부하는 전사 민족
- 교회 국가: 세드릭 대사제가 실권. 종교로 민심을 통제
- 마법사 탑: 아르카누스가 이끄는 마법사 집단. 중립을 표방하나 속내 불명

**주인공: 카이든 (성 불명)**
- 남부 베링 백작가의 외아들, 현재 22세
- 3년 전 가문이 역적으로 몰려 멸문당함. 진짜 이유는 그림자 의회의 음모
- 현재 신분 숨기고 항구도시 베른 뒷골목에서 막일하며 연명
- 외모: 거칠게 자란 흑발, 오른쪽 손목에 낙인(죄인 표식) 있음, 초췌하지만 귀족 교육의 흔적이 남아있음
- 성격: 분노를 억누르고 냉정함을 유지하려 하나 정의감이 강함. 자존심 강함
- 목표: 가문 멸문의 진상 파악 + 복수 + 오명 회복

## 게임 진행 방식
- 플레이어의 입력에 따라 이야기가 전개됨
- 플레이어 입력이 ()로 감싸져 있으면 행동/동작임 (예: (검을 뽑는다), (주위를 경계한다))
- ()없이 오면 대사 또는 자유 입력
- 매 응답 시 반드시 JSON 형식으로만 응답할 것 (마크다운 코드블록 없이 순수 JSON)
- 응답 언어: 한국어

- 주인공은 고난과 굴욕을 자주 겪음. 활협전 스타일
- NPC들은 각자의 목적과 비밀이 있음
- 선택에 따라 관계와 스토리가 달라짐
- 전투는 서술로 표현, 결과는 주사위처럼 상황에 따라 결정
- 할루시네이션 방지: 이미 설정된 캐릭터 정보를 절대 바꾸지 말 것
- 등장하지 않는 캐릭터는 언급하지 말 것`;

function getCharPrompt(charIds) {
  let prompt = '\n## 현재 씬 등장 캐릭터:\n';
  charIds.forEach(id => {
    const c = CHARACTERS[id];
    if (c) prompt += `- ${id} | ${c.name} | ${c.role} | ${c.personality}\n`;
  });
  return prompt;
}

// ===== SAVE / LOAD =====
function autoSave() {
  const save = {
    gameHistory,
    gameState,
    storySummary,
    summaryIndex,
    lastBg,
    turnCount,
    apiKey: API_KEY,
    savedAt: Date.now()
  };
  localStorage.setItem('nakin_save', JSON.stringify(save));
}

function loadSave() {
  try {
    const raw = localStorage.getItem('nakin_save');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function deleteSave() {
  localStorage.removeItem('nakin_save');
  document.getElementById('continueBtn').style.display = 'none';
  document.getElementById('deleteBtn').style.display = 'none';
}

// Check for existing save on load
(function checkSave() {
  const save = loadSave();
  if (save && save.gameHistory && save.gameHistory.length > 0) {
    document.getElementById('continueBtn').style.display = 'block';
    document.getElementById('deleteBtn').style.display = 'block';
    if (save.apiKey) {
      document.getElementById('apiKeyInput').value = save.apiKey;
    }
  }
})();

// ===== START =====
function startGame(isContinue) {
  API_KEY = document.getElementById('apiKeyInput').value.trim();
  if (!API_KEY) return;

  document.getElementById('apiScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  document.addEventListener('click', onTap);
  document.addEventListener('touchend', onTap);

  if (isContinue) {
    const save = loadSave();
    if (save) {
      gameHistory = save.gameHistory || [];
      gameState = save.gameState || gameState;
      storySummary = save.storySummary || '';
      summaryIndex = save.summaryIndex || 0;
      lastBg = save.lastBg || null;
      turnCount = save.turnCount || 0;
      API_KEY = save.apiKey || API_KEY;
      updateStatusUI();
      if (lastBg) setBg(lastBg);

      // Replay last response to restore screen
      const lastAssistant = [...gameHistory].reverse().find(h => h.role === 'assistant');
      if (lastAssistant) {
        try {
          const data = JSON.parse(lastAssistant.content);
          const chars = detectActiveChars(gameHistory.slice(-6));
          updateCharSprites(data.dialogue || [], chars);
          showDialogue([{
            speaker: '시스템', char_id: null, emotion: 'normal',
            text: '— 이전 이야기에서 이어갑니다 —', pose: 'upper'
          }]);
        } catch {
          enterInputMode();
        }
      } else {
        enterInputMode();
      }
      return;
    }
  }

  beginStory();
}

async function beginStory() {
  const intro = {
    role: 'user',
    content: '게임 시작. 첫 장면을 보여줘. 항구도시 베른의 뒷골목, 새벽. 카이든이 부두 막일을 마치고 돌아오는 장면으로 시작해줘. 프레야를 처음 만나는 계기를 만들어줘.'
  };
  gameHistory.push(intro);
  await callGemini(['f106']);
}

// ===== CONTEXT MANAGEMENT =====
function buildMessages() {
  const messages = [];

  if (storySummary) {
    messages.push({
      role: 'user',
      content: `[지금까지의 이야기 요약]\n${storySummary}\n\n[이야기 계속]`
    });
    messages.push({
      role: 'assistant',
      content: '네, 이전 이야기를 기억하고 이어서 진행하겠습니다.'
    });
  }

  const recent = gameHistory.slice(-CONTEXT_RECENT);
  messages.push(...recent);

  return messages;
}

async function summarizeIfNeeded() {
  const unsummarized = gameHistory.length - summaryIndex;
  if (unsummarized < SUMMARY_INTERVAL + CONTEXT_RECENT) return;

  const toSummarize = gameHistory.slice(summaryIndex, gameHistory.length - CONTEXT_RECENT);
  if (toSummarize.length < 4) return;

  const existingCtx = storySummary ? `기존 요약:\n${storySummary}\n\n` : '';
  const newContent = toSummarize.map(h => {
    if (h.role === 'user') return `[플레이어]: ${h.content}`;
    try {
      const d = JSON.parse(h.content);
      let text = '';
      if (d.narration) text += d.narration + ' ';
      if (d.dialogue) d.dialogue.forEach(dl => { text += `${dl.speaker}: ${dl.text} `; });
      return `[이야기]: ${text.trim()}`;
    } catch { return `[이야기]: ${h.content}`; }
  }).join('\n');

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: '당신은 비주얼 노벨 스토리 요약가입니다. 핵심 사건, 캐릭터 관계 변화, 중요한 선택과 결과, 밝혀진 정보만 간결하게 요약하세요. 400자 이내. 서술형으로.' }] },
        contents: [{ role: 'user', parts: [{ text: `${existingCtx}새로운 내용:\n${newContent}\n\n위 내용을 포함하여 전체 이야기를 하나의 통합 요약으로 작성하세요.` }] }],
        generationConfig: { temperature: 0.3, maxOutputTokens: 600 }
      })
    });
    const data = await res.json();
    const summary = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (summary) {
      storySummary = summary.trim();
      summaryIndex = gameHistory.length - CONTEXT_RECENT;
      autoSave();
    }
  } catch {
    // Summary failed silently — not critical
  }
}

// ===== GEMINI API =====
async function callGemini(activeCharIds = []) {
  showThinking();
  sendBtn.disabled = true;

  const charPrompt = activeCharIds.length > 0 ? getCharPrompt(activeCharIds) : '';
  const systemContent = WORLD_PROMPT + charPrompt + '\n\n현재 게임 상태:\n' + JSON.stringify(gameState);
  const messages = buildMessages();

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemContent }] },
        contents: messages.map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }]
        })),
        generationConfig: {
          temperature: 0.9,
          maxOutputTokens: 2048,
        }
      })
    });

    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';

    let parsed;
    try {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(cleaned);
    } catch {
      parsed = { dialogue: [{ speaker: '나레이터', char_id: null, emotion: 'normal', text: raw, pose: 'upper' }], background: null, state_update: {} };
    }

    gameHistory.push({ role: 'assistant', content: JSON.stringify(parsed) });
    turnCount++;
    processResponse(parsed, activeCharIds);
    autoSave();

    // Summarize in background if needed
    summarizeIfNeeded();

  } catch(e) {
    hideThinking();
    showDialogue([{ speaker: '시스템', char_id: null, emotion: 'normal', text: '오류가 발생했습니다: ' + e.message, pose: 'upper' }]);
  } finally {
    sendBtn.disabled = false;
  }
}

// ===== PROCESS RESPONSE =====
function processResponse(data, activeCharIds) {
  hideThinking();

  if (data.background) {
    lastBg = data.background;
    setBg(data.background);
  }

  if (data.state_update) {
    const s = data.state_update;
    if (s.rep) gameState.rep += s.rep;
    if (s.gold) gameState.gold += s.gold;
    if (s.location) gameState.location = s.location;
    if (s.status) gameState.status = s.status;
    if (s.flags) Object.assign(gameState.flags, s.flags);
    updateStatusUI();
  }

  dialogueQueue = [];

  if (data.narration) {
    dialogueQueue.push({ speaker: '나레이터', char_id: null, emotion: 'normal', text: data.narration, pose: 'upper' });
  }

  if (data.dialogue) {
    dialogueQueue.push(...data.dialogue);
  }

  window._pendingChoices = data.choices || null;
  window._activeCharIds = activeCharIds;

  updateCharSprites(data.dialogue || [], activeCharIds);
  showNextDialogue();
}

// ===== CHARACTER SPRITES =====
function updateCharSprites(dialogues, activeCharIds) {
  charLayer.innerHTML = '';
  const uniqueChars = [...new Set(activeCharIds)];

  uniqueChars.forEach(charId => {
    const img = document.createElement('img');
    img.className = 'char-sprite';
    img.id = 'sprite_' + charId;
    const num = charId.replace('f', '');
    img.src = `character/25_upper/${num}_1.png`;
    img.onerror = function() {
      if (this.dataset.fallback === '1') {
        this.style.opacity = '0';
        return;
      }
      this.dataset.fallback = '1';
      this.src = `character/25_full/f_${num}_1.png`;
      this.onerror = function() { this.style.opacity = '0'; };
    };
    charLayer.appendChild(img);
    setTimeout(() => img.classList.add('visible'), 50);
  });
}

function updateSpriteEmotion(charId, emotion, pose) {
  const sprite = document.getElementById('sprite_' + charId);
  if (!sprite) return;

  const num = charId.replace('f', '');
  sprite.dataset.fallback = '0';

  if (pose === 'pose') {
    sprite.src = `character/25_pose/p_${num}.png`;
  } else if (pose === 'full') {
    const emoNum = EMOTION_MAP.full[emotion] || 1;
    sprite.src = `character/25_full/f_${num}_${emoNum}.png`;
  } else {
    const emoNum = EMOTION_MAP.upper[emotion] || 1;
    sprite.src = `character/25_upper/${num}_${emoNum}.png`;
  }
}

// ===== DIALOGUE SYSTEM =====
function showNextDialogue() {
  if (dialogueQueue.length === 0) {
    if (window._pendingChoices && window._pendingChoices.length > 0) {
      showChoices(window._pendingChoices);
    } else {
      enterInputMode();
    }
    return;
  }

  const d = dialogueQueue.shift();
  isShowing = true;
  waitingForTap = false;

  nameplate.textContent = d.speaker;

  if (d.char_id) {
    document.querySelectorAll('.char-sprite').forEach(s => {
      s.classList.remove('speaking');
      s.classList.add('silent');
    });
    const speaking = document.getElementById('sprite_' + d.char_id);
    if (speaking) {
      speaking.classList.remove('silent');
      speaking.classList.add('speaking');
      updateSpriteEmotion(d.char_id, d.emotion || 'normal', d.pose || 'upper');
    }
  } else {
    document.querySelectorAll('.char-sprite').forEach(s => {
      s.classList.remove('speaking', 'silent');
    });
  }

  typeText(d.text, () => {
    waitingForTap = true;
    isShowing = false;
  });
}

function typeText(text, callback) {
  dialogueText.textContent = '';
  document.getElementById('continueHint').style.display = 'none';
  let i = 0;
  const speed = 30;
  const timer = setInterval(() => {
    dialogueText.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(timer);
      document.getElementById('continueHint').style.display = 'block';
      callback();
    }
  }, speed);
  window._typeTimer = timer;
  window._typeCallback = callback;
  window._typeFull = text;
}

function onTap(e) {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
  if (inputMode) return;

  if (isShowing) {
    clearInterval(window._typeTimer);
    dialogueText.textContent = window._typeFull;
    document.getElementById('continueHint').style.display = 'block';
    isShowing = false;
    waitingForTap = true;
    return;
  }

  if (waitingForTap) {
    waitingForTap = false;
    showNextDialogue();
  }
}

// ===== CHOICES =====
function showChoices(choices) {
  inputMode = true;
  inputBar.style.display = 'flex';
  dialogueBox.style.paddingBottom = '72px';

  const choiceDiv = document.createElement('div');
  choiceDiv.id = 'choiceBox';
  choiceDiv.style.cssText = `
    position:fixed; bottom:230px; left:0; right:0;
    display:flex; flex-direction:column; align-items:center;
    gap:8px; z-index:20; padding:0 16px;
  `;

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.textContent = choice;
    btn.style.cssText = `
      background:rgba(10,8,20,0.95); border:1px solid var(--gold-dim);
      color:var(--text); padding:10px 24px; border-radius:3px;
      cursor:pointer; font-family:'Noto Sans KR',sans-serif;
      font-size:0.9rem; width:100%; max-width:400px;
      transition:all 0.2s;
    `;
    btn.onmouseover = () => btn.style.borderColor = 'var(--gold)';
    btn.onmouseout = () => btn.style.borderColor = 'var(--gold-dim)';
    btn.onclick = () => {
      choiceDiv.remove();
      handlePlayerInput(choice);
    };
    choiceDiv.appendChild(btn);
  });

  const customBtn = document.createElement('button');
  customBtn.textContent = '✎ 직접 입력';
  customBtn.style.cssText = `
    background:transparent; border:1px dashed var(--accent);
    color:var(--gold-dim); padding:8px 24px; border-radius:3px;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif;
    font-size:0.85rem; width:100%; max-width:400px;
    transition:all 0.2s; margin-top:4px;
  `;
  customBtn.onmouseover = () => { customBtn.style.borderColor = 'var(--gold)'; customBtn.style.color = 'var(--text)'; };
  customBtn.onmouseout = () => { customBtn.style.borderColor = 'var(--accent)'; customBtn.style.color = 'var(--gold-dim)'; };
  customBtn.onclick = () => {
    choiceDiv.remove();
    enterInputMode();
    userInput.focus();
  };
  choiceDiv.appendChild(customBtn);

  document.body.appendChild(choiceDiv);
}

// ===== INPUT MODE =====
function enterInputMode() {
  inputMode = true;
  inputBar.style.display = 'flex';
  dialogueBox.style.paddingBottom = '72px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || sendBtn.disabled) return;
  userInput.value = '';
  inputBar.style.display = 'none';
  inputMode = false;
  dialogueBox.style.paddingBottom = '0';

  const cb = document.getElementById('choiceBox');
  if (cb) cb.remove();

  handlePlayerInput(text);
}

async function handlePlayerInput(text) {
  gameHistory.push({ role: 'user', content: text });
  autoSave();

  const recentHistory = gameHistory.slice(-6);
  const mentionedChars = detectActiveChars(recentHistory);

  await callGemini(mentionedChars);
}

// ===== DETECT ACTIVE CHARS (exact matching) =====
function detectActiveChars(history) {
  // Sort by name length descending to match longer names first (레오나르 before 레온)
  const sorted = Object.entries(CHARACTERS)
    .map(([id, c]) => ({ id, name: c.name }))
    .sort((a, b) => b.name.length - a.name.length);

  const mentioned = new Set();
  const recentText = history.map(h => h.content).join(' ');

  sorted.forEach(({ id, name }) => {
    // Check if this name appears, but not as part of an already-matched longer name
    const regex = new RegExp(name, 'g');
    let match;
    while ((match = regex.exec(recentText)) !== null) {
      const before = recentText[match.index - 1] || ' ';
      const after = recentText[match.index + name.length] || ' ';
      // For 레온: skip if followed by characters that make it 레오나르
      let dominated = false;
      for (const other of sorted) {
        if (other.name.length > name.length && other.name.includes(name) && recentText.includes(other.name)) {
          // Check if this specific occurrence is part of the longer name
          const longerIdx = recentText.indexOf(other.name);
          if (match.index >= longerIdx && match.index < longerIdx + other.name.length) {
            dominated = true;
            break;
          }
        }
      }
      if (!dominated) {
        mentioned.add(id);
        break;
      }
    }
  });

  return [...mentioned].slice(0, 4);
}

// ===== BACKGROUND =====
function setBg(name) {
  const resolved = pickBg(name);
  bgLayer.style.backgroundImage = `url('background/${resolved}.png')`;
}

// ===== STATUS UI =====
function updateStatusUI() {
  document.getElementById('stName').textContent = gameState.name;
  document.getElementById('stStatus').textContent = gameState.status;
  document.getElementById('stRep').textContent = gameState.rep;
  document.getElementById('stGold').textContent = gameState.gold + 'G';
  document.getElementById('stLocation').textContent = gameState.location;
}

function toggleStatus() {
  statusPanel.classList.toggle('visible');
}

function showDialogue(dialogues) {
  dialogueQueue = dialogues;
  showNextDialogue();
}
